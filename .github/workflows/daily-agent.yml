name: Daily Agent Cycle

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22시)
    - cron: "0 22 * * *"
  workflow_dispatch: # 수동 실행 가능

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run daily cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run agent:once

      - name: Commit and push new posts
        run: |
          git config user.name "AI Content Agent"
          git config user.email "agent@aipulse.dev"
          git add content/ data/ logs/ src/memory/
          git diff --staged --quiet || git commit -m "auto: daily content $(date +%Y-%m-%d)"
          git push
